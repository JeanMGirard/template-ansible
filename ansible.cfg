[defaults]
# Paths
inventory           = ./inventory
roles_path          = ./roles
collections_path    = ./collections
# Authentication
remote_user         = ansible
private_key_file    = ~/.ssh/id_rsa
# WARNING: Enabling host_key_checking is recommended in production to prevent
# man-in-the-middle attacks. Set to False only in trusted/lab environments.
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = yaml
callbacks_enabled   = profile_tasks
# Caching
fact_caching = jsonfile
fact_caching_connection = .cache
fact_caching_timeout = 3600
# Ansible-Vault
vault_password_file = ./config/.vault_pass

# stdout_callback = debug
# bin_ansible_callbacks = True
# callback_result_format = yaml
# callbacks_enabled = ansible.posix.profile_tasks
# check_mode_markers = yes
# display_failed_stderr = yes
# force_handlers = yes
# forks = 20
# gathering = smart
# host_key_checking = False
# interpreter_python = auto_silent
# inventory = ./inventory
# nocows = 1
# retry_files_enabled = False
# show_task_path_on_failure = yes

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
# Set to True to be prompted for the sudo password, or ensure passwordless sudo
# is configured on target hosts (e.g. via /etc/sudoers.d/ansible).
become_ask_pass = False

[ssh_connection]
ssh_args        = -o ControlMaster=auto -o ControlPersist=60s
pipelining      = True

[colors]
changed = bright yellow
error = bright red
ok = bright green

[diff]
always = True


