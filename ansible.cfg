[defaults]
inventory           = inventory/
roles_path          = roles/
collections_path    = collections/
remote_user         = ansible
private_key_file    = ~/.ssh/id_rsa
# WARNING: Enabling host_key_checking is recommended in production to prevent
# man-in-the-middle attacks. Set to False only in trusted/lab environments.
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = yaml
callbacks_enabled   = profile_tasks

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
# Set to True to be prompted for the sudo password, or ensure passwordless sudo
# is configured on target hosts (e.g. via /etc/sudoers.d/ansible).
become_ask_pass = False

[ssh_connection]
ssh_args        = -o ControlMaster=auto -o ControlPersist=60s
pipelining      = True
